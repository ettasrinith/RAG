<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Knowledge Hub</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <div class="app">
    <nav class="nav">
      <div class="nav-brand">
        <div class="nav-logo">KH</div>
        <span>Knowledge Hub</span>
      </div>
      <div class="nav-links">
        <button class="nav-btn active" data-page="index">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
          Index
        </button>
        <button class="nav-btn" data-page="search">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
          Search
        </button>
        <button class="nav-btn" data-page="chat">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
          Chat
        </button>
      </div>
      <div class="nav-status" id="navStatus">
        <span class="status-dot"></span>
        <span id="statusText">Ready</span>
      </div>
    </nav>

    <main class="content">

      <!-- INDEX PAGE -->
      <section class="page active" id="page-index">
        <div class="page-header">
          <h1>Add content</h1>
          <p>Pick a source, configure it, and index it into your knowledge base.</p>
        </div>

        <div class="source-tabs">
          <button class="source-tab active" data-source="local">Folder</button>
          <button class="source-tab" data-source="github">GitHub</button>
          <button class="source-tab" data-source="website">Website</button>
          <button class="source-tab" data-source="arxiv">arXiv</button>
          <button class="source-tab" data-source="youtube">YouTube</button>
          <button class="source-tab" data-source="zip">ZIP</button>
        </div>

        <!-- Local -->
        <div class="source-panel active" id="panel-local">
          <div class="field">
            <label>Project or notes folder</label>
            <div class="input-row">
              <input type="text" id="repoPath" placeholder="C:/Users/you/Documents/my-project">
              <button class="btn" onclick="browseFolders()">Browse</button>
            </div>
            <div class="folder-list" id="folderList"></div>
          </div>
        </div>

        <!-- GitHub -->
        <div class="source-panel" id="panel-github">
          <div class="field-row">
            <div class="field">
              <label>Repository</label>
              <input type="text" id="githubRepo" placeholder="owner/repo">
            </div>
            <div class="field">
              <label>Branch (optional)</label>
              <input type="text" id="githubBranch" placeholder="main">
            </div>
          </div>
          <div class="field">
            <label>Personal access token</label>
            <input type="password" id="githubPat" placeholder="ghp_...">
          </div>
        </div>

        <!-- Website -->
        <div class="source-panel" id="panel-website">
          <div class="field">
            <label>Start URLs (one per line)</label>
            <textarea id="websiteStartUrls" rows="3" placeholder="https://docs.example.com&#10;https://blog.example.com"></textarea>
          </div>
          <div class="field-row">
            <div class="field">
              <label>Max pages</label>
              <input type="number" id="websiteMaxPages" value="150" min="1" max="5000">
            </div>
            <div class="field">
              <label>Max depth</label>
              <input type="number" id="websiteMaxDepth" value="2" min="0" max="10">
            </div>
            <label class="checkbox">
              <input type="checkbox" id="websiteSameDomainOnly" checked>
              Same domain only
            </label>
          </div>
        </div>

        <!-- arXiv -->
        <div class="source-panel" id="panel-arxiv">
          <div class="field">
            <label>Topic search (query all fields)</label>
            <input type="text" id="arxivQuery" placeholder="e.g. transformer attention mechanism">
          </div>
          <div class="field-row">
            <div class="field">
              <label>Max results</label>
              <input type="number" id="arxivMaxResults" value="50" min="1" max="1000">
            </div>
          </div>
          <div class="field">
            <label>Or specific arXiv IDs/URLs (one per line)</label>
            <textarea id="arxivIds" rows="3" placeholder="1706.03762&#10;https://arxiv.org/abs/2401.00001"></textarea>
          </div>
        </div>

        <!-- YouTube -->
        <div class="source-panel" id="panel-youtube">
          <div class="field">
            <label>Video URLs or IDs (one per line)</label>
            <textarea id="youtubeUrls" rows="4" placeholder="https://www.youtube.com/watch?v=..."></textarea>
          </div>
        </div>

        <!-- ZIP -->
        <div class="source-panel" id="panel-zip">
          <div class="field">
            <label>Upload a ZIP of notes, docs, or project files</label>
            <input type="file" id="zipFile" accept=".zip">
          </div>
          <div id="zipSummary" class="hidden"></div>
        </div>

        <div class="index-actions">
          <label class="checkbox">
            <input type="checkbox" id="forceFull">
            Force full re-index
          </label>
          <div class="btn-group">
            <button class="btn" onclick="saveSourceConfig()">Save</button>
            <button class="btn primary" id="startBtn" onclick="startIndexing()">Start indexing</button>
            <button class="btn danger" id="stopBtn" onclick="stopIndexing()" disabled>Stop</button>
          </div>
        </div>

        <div class="card hidden" id="progressCard">
          <div class="card-header">
            <h3>Progress</h3>
            <span class="badge" id="progressBadge">Idle</span>
          </div>
          <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
          </div>
          <div class="progress-info">
            <span id="progressLabel">Waiting...</span>
            <span id="progressPercent">0%</span>
          </div>
          <div class="log" id="progressLog"></div>
        </div>
      </section>

      <!-- SEARCH PAGE -->
      <section class="page" id="page-search">
        <div class="page-header">
          <h1>Search</h1>
          <p>Find anything across your indexed content.</p>
        </div>

        <form id="searchForm" onsubmit="return doSearch(event)">
          <div class="search-bar">
            <input type="text" id="searchQuery" placeholder="Search your knowledge base..." required autofocus>
            <button type="submit" class="btn primary" id="searchBtn">Search</button>
          </div>
          <div class="search-filters">
            <select id="searchRepo">
              <option value="">All sources</option>
            </select>
            <select id="searchSource">
              <option value="">All types</option>
              <option value="github_files">Files</option>
              <option value="github_commits">Commits</option>
              <option value="website">Website</option>
              <option value="documents">Documents</option>
              <option value="arxiv">arXiv</option>
              <option value="youtube">YouTube</option>
            </select>
            <label class="checkbox">
              <input type="checkbox" id="searchHybrid" checked>
              Hybrid
            </label>
          </div>
        </form>

        <div id="searchResults"></div>
      </section>

      <!-- CHAT PAGE -->
      <section class="page" id="page-chat">
        <div class="chat-container">
          <div class="chat-messages" id="chatMessages">
            <div class="msg assistant">
              <div class="bubble">Ask me anything about your indexed content. I'll answer with sources.</div>
            </div>
          </div>
          <form class="chat-bar" onsubmit="return sendChat(event)">
            <input type="text" id="chatInput" placeholder="Ask a question...">
            <button type="submit" class="btn primary" id="chatBtn">Send</button>
          </form>
        </div>
      </section>

    </main>
  </div>

  <div class="toasts" id="toasts"></div>
  <script src="/static/app.js" defer></script>
</body>
</html>
