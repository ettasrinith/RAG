version: "3.9"

services:
  knowledge-hub:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./.env:/app/.env:ro
    environment:
      - KH_API_KEY=${KH_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ZEN_API_KEY=${ZEN_API_KEY:-}
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G
